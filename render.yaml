databases:
  - name: ai-hcp-crm-db
    databaseName: hcp_crm
    user: hcp
    plan: free

services:
  - type: web
    name: ai-hcp-crm-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        fromDatabase:
          name: ai-hcp-crm-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: CORS_ORIGINS
        value: https://ai-hcp-crm-frontend.onrender.com

  - type: static
    name: ai-hcp-crm-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://ai-hcp-crm-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
